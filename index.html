<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>Tip Calculator</h1>

      <div class="input-group">
        <label>Bill Amount (Rs)</label>

        <input
          type="number"
          id="bill"
          placeholder="Enter bill amount"
        />

        <p class="error" id="billError"></p>
      </div>

      <div class="input-group">

        <label>Select Tip %</label>

        <div class="tip-buttons">

          <button class="tip-btn active" data-tip="10">
            10%
          </button>

          <button class="tip-btn" data-tip="15">
            15%
          </button>

          <button class="tip-btn" data-tip="20">
            20%
          </button>

        </div>

        <input
          type="number"
          id="customTip"
          placeholder="Custom Tip %"
        />

        <p class="error" id="tipError"></p>

      </div>

      <div class="input-group">

        <label>Number of People</label>

        <input
          type="number"
          id="people"
          placeholder="Enter number of people"
        />

        <p class="error" id="peopleError"></p>

      </div>

      <div class="result-box">

        <div class="result-item">
          <span>Total Tip</span>
          <strong id="tipAmount">Rs 0.00</strong>
        </div>

        <div class="result-item">
          <span>Grand Total</span>
          <strong id="grandTotal">Rs 0.00</strong>
        </div>

        <div class="result-item">
          <span>Per Person</span>
          <strong id="perPerson">Rs 0.00</strong>
        </div>

      </div>

      <!-- Reset -->

      <button id="resetBtn">
        Reset
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
